    <script>
      window.__timelines = window.__timelines || {};

      const tl = gsap.timeline({ paused: true });
      const wipes = ["#wipe-a", "#wipe-b", "#wipe-c"];

      function blockTransition(oldScene, newScene, startTime) {
        tl.set(wipes, { xPercent: -100, opacity: 1 }, startTime - 0.02);
        tl.to("#flash", { opacity: 0.38, duration: 0.05, ease: "none", overwrite: "auto" }, startTime + 0.05);
        tl.to("#flash", { opacity: 0, duration: 0.16, ease: "power4.out", overwrite: "auto" }, startTime + 0.11);
        tl.to("#wipe-a", { xPercent: 0, duration: 0.22, ease: "power4.inOut", overwrite: "auto" }, startTime);
        tl.to("#wipe-b", { xPercent: 0, duration: 0.22, ease: "power4.inOut", overwrite: "auto" }, startTime + 0.045);
        tl.to("#wipe-c", { xPercent: 0, duration: 0.22, ease: "power4.inOut", overwrite: "auto" }, startTime + 0.09);
        tl.set(oldScene, { opacity: 0, zIndex: 1, visibility: "hidden" }, startTime + 0.28);
        tl.set(newScene, { opacity: 1, zIndex: 2, visibility: "visible" }, startTime + 0.28);
        tl.to("#wipe-a", { xPercent: 100, duration: 0.24, ease: "power4.inOut", overwrite: "auto" }, startTime + 0.35);
        tl.to("#wipe-b", { xPercent: 100, duration: 0.24, ease: "power4.inOut", overwrite: "auto" }, startTime + 0.405);
        tl.to("#wipe-c", { xPercent: 100, duration: 0.24, ease: "power4.inOut", overwrite: "auto" }, startTime + 0.46);
        tl.set(wipes, { xPercent: -100 }, startTime + 0.76);
      }

      tl.from("#scene-1 .grid-bg", { opacity: 0, duration: 0.5, ease: "sine.out" }, 0.12);
      tl.from("#s1-top", { y: -70, opacity: 0, duration: 0.42, ease: "expo.out" }, 0.18);
      tl.from("#s1-stop", { x: -180, scale: 1.22, opacity: 0, duration: 0.28, ease: "back.out(1.8)" }, 0.45);
      tl.from("#s1-applying", { x: 160, opacity: 0, duration: 0.34, ease: "power4.out" }, 0.82);
      tl.from("#s1-one", { scale: 0.72, opacity: 0, duration: 0.22, ease: "expo.out" }, 1.18);
      tl.from("#s1-time", { y: 90, opacity: 0, duration: 0.32, ease: "back.out(1.35)" }, 1.5);
      tl.from("#s1-bottom", { y: 60, opacity: 0, duration: 0.42, ease: "power3.out" }, 1.9);
      tl.to(".ghost-a", { x: 70, duration: 29.5, ease: "none" }, 0.2);

      blockTransition("#scene-1", "#scene-2", 3.1);

      tl.from("#s2-tag", { x: -80, opacity: 0, duration: 0.36, ease: "expo.out" }, 3.62);
      tl.from("#s2-code span", { x: -120, opacity: 0, stagger: 0.08, duration: 0.28, ease: "power4.out" }, 3.78);
      tl.from("#s2-manual", { scaleX: 1.45, x: 120, opacity: 0, duration: 0.26, ease: "back.out(1.4)" }, 3.92);
      tl.from("#s2-drain", { scale: 0.62, rotation: -2, opacity: 0, duration: 0.22, ease: "expo.out" }, 4.28);
