<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jobraker Recruiter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Questrial&display=swap"
    />
    <style>
      /* Prevent flash of white background before CSS loads */
      html, body { margin: 0; padding: 0; }
      html.dark, html.dark body { background-color: #000; }
      html.light, html.light body { background-color: #fff; }
    </style>
    <script>
      // Apply theme class immediately before render
      (function() {
        var stored = localStorage.getItem('jobraker-recruiter-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = stored || 'dark';
        var resolved = theme === 'system' ? (prefersDark ? 'dark' : 'light') : theme;
        document.documentElement.classList.add(resolved);
        if (resolved === 'dark') document.documentElement.style.colorScheme = 'dark';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
